# Render Blueprint for Architecht
# One-click deploy: backend + frontend.
# Database is hosted externally on MongoDB Atlas (Free Tier).

services:
  # ----- Backend API (FastAPI) -----
  - type: web
    name: architecht-backend
    runtime: python
    plan: free                 # Changed to free tier
    region: singapore          # Closest Render free region to Sydney
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      # Paste your MongoDB Atlas cloud string directly in the Render dashboard
      - key: MONGO_URL
        value: "mongodb+srv://rgadagi_db_user:mypassword123@cluster0.rob1zzt.mongodb.net/?appName=Cluster0"             
      - key: DB_NAME
        value: architecht
      # Pre-wired to the default frontend hostname produced by this blueprint
      - key: CORS_ORIGINS
        value: https://architecht-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_DAYS
        value: "30"
      # ----- AWS Bedrock -----
      - key: AWS_ACCESS_KEY_ID
        sync: false             # Paste your AWS credentials in the dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_SESSION_TOKEN
        sync: false
      - key: BEDROCK_API_KEY
        sync: false             # Optional direct Bedrock API key for runtime auth
      - key: BEDROCK_HTTP_PROXY
        value: http://scansafe.stockland.com.au:8080
      - key: BEDROCK_HTTPS_PROXY
        value: http://scansafe.stockland.com.au:8080
      - key: AWS_REGION
        value: ap-southeast-2   # Sydney
      - key: BEDROCK_MODEL_ID
        value: au.anthropic.claude-sonnet-4-6
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ----- Frontend (static React build) -----
  - type: web
    name: architecht-frontend
    runtime: static            # Static sites are always free on Render
    rootDir: frontend
    buildCommand: corepack enable && yarn install --frozen-lockfile && yarn build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://architecht-backend.onrender.com
      - key: NODE_VERSION
        value: "20.11.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: /static/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
