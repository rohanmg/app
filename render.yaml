# Render Blueprint for Architecht
# Spin up backend (FastAPI) + frontend (static React build) in one click.
# MongoDB is expected to come from MongoDB Atlas (free M0) — set MONGO_URL via dashboard.

services:
  # ----- Backend API -----
  - type: web
    name: architecht-backend
    runtime: python
    plan: starter            # bump to standard for higher RAM if your LLDs are large
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        sync: false          # set this in the Render dashboard to your Atlas SRV string
      - key: DB_NAME
        value: architecht
      - key: CORS_ORIGINS
        sync: false          # set to your frontend URL, e.g. https://architecht-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true  # Render will generate a strong random value once
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_DAYS
        value: "30"
      - key: AWS_BEARER_TOKEN_BEDROCK
        sync: false          # paste your Bedrock API key in the Render dashboard
      - key: AWS_REGION
        value: us-east-1
      - key: BEDROCK_MODEL_ID
        value: us.anthropic.claude-sonnet-4-5-20250929-v1:0
        # swap to haiku: us.anthropic.claude-haiku-4-5-20251022-v1:0
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ----- Frontend (static React build) -----
  - type: web
    name: architecht-frontend
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: corepack enable && yarn install --frozen-lockfile && yarn build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false          # set to the deployed backend URL, e.g. https://architecht-backend.onrender.com
      - key: NODE_VERSION
        value: "20.11.0"
    routes:
      # SPA fallback so React Router works for /dashboard, /lld/:id, /share/:token, etc.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: /static/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
